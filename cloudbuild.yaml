steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/v1-ai-fieldreports', '.']

  # Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/v1-ai-fieldreports']

  # Deploy to the REAL service name and region
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'v1-ai-fieldreports'
      - '--image'
      - 'gcr.io/$PROJECT_ID/v1-ai-fieldreports'
      - '--region'
      - 'us-east1'
      - '--platform'
      - 'managed'

# Logs configuration (Aligned at root)
logsBucket: 'gs://v1-ai-fieldreports-build-logs'

options:
  logging: GCS_ONLY
